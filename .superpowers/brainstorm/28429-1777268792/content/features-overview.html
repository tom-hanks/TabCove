<h2>Tab Out 功能拓展方向</h2>
<p class="subtitle">点击感兴趣的方向，看看具体可以做什么</p>

<div class="options">
  <div class="option" data-choice="inactive" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>⏱️ 闲置时间标注</h3>
      <p>显示每个标签上次激活时间，用分钟/小时/天标识</p>
    </div>
  </div>

  <div class="option" data-choice="group-native" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>📦 一键创建 Chrome 原生分组</h3>
      <p>点击按钮，将该域名的标签在浏览器中创建为原生标签组</p>
    </div>
  </div>

  <div class="option" data-choice="search" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>🔍 搜索与筛选</h3>
      <p>标签页搜索、按时间/域名筛选、死链检测</p>
    </div>
  </div>

  <div class="option" data-choice="suspend" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>💤 标签页休眠</h3>
      <p>自动休眠长期未访问的标签，释放内存</p>
    </div>
  </div>

  <div class="option" data-choice="history" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>⏪ 历史与恢复</h3>
      <p>最近关闭的标签、误关闭恢复、关闭统计</p>
    </div>
  </div>

  <div class="option" data-choice="shortcuts" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>⌨️ 快捷键支持</h3>
      <p>键盘操作、命令面板、跳转搜索</p>
    </div>
  </div>
</div>

<p class="section" style="margin-top: 24px; text-align: center; color: #666; font-size: 13px;">
  可以多选感兴趣的方向，我会为你详细设计
</p>
